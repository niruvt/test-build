name: build and release apks

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: build all language apks
    runs-on: ubuntu-latest

    steps:
      - name: checkout source
        uses: actions/checkout@v4

      - name: set up jdk 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: set up android sdk
        uses: android-actions/setup-android@v3

      - name: install sdk components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: make gradlew executable
        run: chmod +x gradlew

      - name: build and sign all apks
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-apks
          LANGUAGES="bengali gujarati hindi kannada konkani malayalam marathi oriya telugu tamil asomiya punjabi"
          SUCCEEDED=""
          FAILED=""

          for lang in $LANGUAGES; do
            cap="$(echo ${lang:0:1} | tr '[:lower:]' '[:upper:]')${lang:1}"
            echo "▶ building swarachakra-${lang}-${VERSION}.apk"

            if ./gradlew "assemble${cap}Release" --quiet; then
              unsigned=$(find "app/build/outputs/apk/${lang}/release" -name "*.apk" 2>/dev/null | head -1)
              if [ -n "$unsigned" ]; then
                signed="release-apks/swarachakra-${lang}-${VERSION}.apk"
                if "$ANDROID_HOME/build-tools/34.0.0/apksigner" sign \
                    --ks keystore.jks \
                    --ks-pass "pass:${KEY_STORE_PASSWORD}" \
                    --ks-key-alias "${KEY_ALIAS}" \
                    --key-pass "pass:${KEY_PASSWORD}" \
                    --out "${signed}" \
                    "${unsigned}"; then
                  echo "  ✓ signed: $(basename $signed)"
                  SUCCEEDED="$SUCCEEDED $lang"
                else
                  echo "  ✗ signing failed for $lang"
                  FAILED="$FAILED $lang"
                fi
              else
                echo "  ✗ apk not found for $lang"
                FAILED="$FAILED $lang"
              fi
            else
              echo "  ✗ build failed for $lang"
              FAILED="$FAILED $lang"
            fi
          done

          echo ""
          echo "========================================"
          echo "  BUILD SUMMARY"
          echo "========================================"
          echo "  succeeded:$(echo $SUCCEEDED | tr ' ' '\n' | grep -v '^$' | sed 's/^/    /')"
          echo "  failed:$(echo $FAILED | tr ' ' '\n' | grep -v '^$' | sed 's/^/    /')"
          echo "========================================"

          count=$(ls release-apks/*.apk 2>/dev/null | wc -l)
          echo "  total apks: $count / 12"

          if [ $count -eq 0 ]; then
            echo "no apks produced, failing"
            exit 1
          fi

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          name: "Swarachakra ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          body: |
            ## Swarachakra ${{ github.ref_name }}

            Keyboard APKs for all 12 supported languages.
            Install only the language(s) you need.

            | APK | Language |
            |-----|----------|
            | swarachakra-asomiya-*.apk   | Asomiya (Assamese) |
            | swarachakra-bengali-*.apk   | Bengali            |
            | swarachakra-gujarati-*.apk  | Gujarati           |
            | swarachakra-hindi-*.apk     | Hindi              |
            | swarachakra-kannada-*.apk   | Kannada            |
            | swarachakra-konkani-*.apk   | Konkani            |
            | swarachakra-malayalam-*.apk | Malayalam          |
            | swarachakra-marathi-*.apk   | Marathi            |
            | swarachakra-oriya-*.apk     | Odia               |
            | swarachakra-punjabi-*.apk   | Punjabi            |
            | swarachakra-tamil-*.apk     | Tamil              |
            | swarachakra-telugu-*.apk    | Telugu             |

            **Install via ADB:**
            ```
            adb install swarachakra-hindi-${{ github.ref_name }}.apk
            ```

            **Obtainium**: point at this repository, set APK filter to
            `swarachakra-<your-language>-` to track only your language.
          files: release-apks/*.apk
          max_retries: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
