name: build and release apks

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'

jobs:
  build:
    name: build all language apks
    runs-on: ubuntu-latest

    steps:
      - name: checkout source
        uses: actions/checkout@v4

      - name: set up jdk 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: set up android sdk
        uses: android-actions/setup-android@v3

      - name: install sdk components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: make gradlew executable
        run: chmod +x gradlew

      - name: build and sign all apks
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # determine if this is a beta build from the tag
          if echo "$TAG" | grep -q "\-beta\."; then
            APK_SUFFIX="-beta"
            IS_PRERELEASE="true"
          elif echo "$TAG" | grep -qE "^v0\."; then
            APK_SUFFIX=""
            IS_PRERELEASE="true"
          else
            APK_SUFFIX=""
            IS_PRERELEASE="false"
          fi

          echo "TAG=$TAG VERSION=$VERSION SUFFIX=$APK_SUFFIX PRERELEASE=$IS_PRERELEASE"
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV
          echo "APK_SUFFIX=$APK_SUFFIX"       >> $GITHUB_ENV
          echo "VERSION=$VERSION"             >> $GITHUB_ENV

          mkdir -p release-apks
          LANGUAGES="bengali gujarati hindi kannada konkani malayalam marathi oriya telugu tamil asomiya punjabi"
          SUCCEEDED=""
          FAILED=""

          for lang in $LANGUAGES; do
            cap="$(echo ${lang:0:1} | tr '[:lower:]' '[:upper:]')${lang:1}"
            apk_name="swarachakra-${lang}-${VERSION}${APK_SUFFIX}.apk"
            echo "▶ building ${apk_name}"

            if ./gradlew "assemble${cap}Release" --quiet; then
              unsigned=$(find "app/build/outputs/apk/${lang}/release" -name "*.apk" 2>/dev/null | head -1)
              if [ -n "$unsigned" ]; then
                signed="release-apks/${apk_name}"
                if "$ANDROID_HOME/build-tools/34.0.0/apksigner" sign \
                    --ks keystore.jks \
                    --ks-pass "pass:${KEY_STORE_PASSWORD}" \
                    --ks-key-alias "${KEY_ALIAS}" \
                    --key-pass "pass:${KEY_PASSWORD}" \
                    --out "${signed}" \
                    "${unsigned}"; then
                  echo "  ✓ ${apk_name}"
                  SUCCEEDED="$SUCCEEDED $lang"
                else
                  echo "  ✗ signing failed for $lang"
                  FAILED="$FAILED $lang"
                fi
              else
                echo "  ✗ apk not found for $lang"
                FAILED="$FAILED $lang"
              fi
            else
              echo "  ✗ build failed for $lang"
              FAILED="$FAILED $lang"
            fi
          done

          echo ""
          echo "========================================"
          echo "  BUILD SUMMARY"
          echo "========================================"
          for l in $SUCCEEDED; do echo "  ✓ $l"; done
          for l in $FAILED;    do echo "  ✗ $l"; done
          count=$(ls release-apks/*.apk 2>/dev/null | wc -l)
          echo "  total: $count / 12"
          echo "========================================"

          if [ "$count" -eq 0 ]; then
            echo "no apks produced — failing"
            exit 1
          fi

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          name: "Swarachakra ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          body: |
            ## Swarachakra ${{ github.ref_name }}

            Keyboard APKs for all 12 supported languages.
            Install only the language(s) you need.

            | APK | Language |
            |-----|----------|
            | swarachakra-asomiya-*.apk   | Asomiya (Assamese) |
            | swarachakra-bengali-*.apk   | Bengali            |
            | swarachakra-gujarati-*.apk  | Gujarati           |
            | swarachakra-hindi-*.apk     | Hindi              |
            | swarachakra-kannada-*.apk   | Kannada            |
            | swarachakra-konkani-*.apk   | Konkani            |
            | swarachakra-malayalam-*.apk | Malayalam          |
            | swarachakra-marathi-*.apk   | Marathi            |
            | swarachakra-oriya-*.apk     | Odia               |
            | swarachakra-punjabi-*.apk   | Punjabi            |
            | swarachakra-tamil-*.apk     | Tamil              |
            | swarachakra-telugu-*.apk    | Telugu             |

            **Install via ADB:**
            ```
            adb install swarachakra-hindi-${{ github.ref_name }}.apk
            ```

            **Obtainium**: point at this repository, set APK filter to
            `swarachakra-<your-language>-` to track only your language.
            For beta builds, use `swarachakra-<your-language>-.*-beta`.
          files: release-apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
